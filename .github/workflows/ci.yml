name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_ENV: test
      # CI only needs a syntactically valid connection string for Prisma wiring;
      # the tests mock external DB interactions.
      DATABASE_URL: postgresql://credit:change-me@localhost:5432/credit_tracker
      PORT: 3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Generate JWT secret
        run: echo "JWT_SECRET=$(openssl rand -base64 48)" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
